<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
          integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">

    <title>Timeline Maker</title>
</head>

<body class="container">
<nav class="navbar navbar-light bg-light">
    <a class="navbar-brand" href="index.html">Timeline Maker</a>
</nav>
<div class="row mt-sm-5 justify-content-sm-center">
    <div class="col-sm-5">
        <form id="add-event" action="timeline.html">

            <div class="form-group">
                <label for="inputAddress">Year</label>
                <input type="text" class="form-control" id="inputAddress" placeholder="Write year of event...">
            </div>
            <div class="form-group">
                <label for="validationTextarea">Event</label>
                <textarea class="form-control" id="validationTextarea" placeholder="Write a description of event..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group col-md">
                    <label for="inputState">Choose event type</label>
                    <select id="inputState" class="form-control">
                        <option selected>Choose...</option>
                        <option>Success</option>
                        <option>Failure</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-primary">Add Event</button>
        </form>

    </div>
</div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
        integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
        crossorigin="anonymous"></script>

<script src="index.js"></script>
</body>

</html>
